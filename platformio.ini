; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32_usb]
platform = espressif32
board = esp32dev
framework = arduino

upload_protocol = esptool
monitor_speed = 115200
lib_deps =
;    kosme/arduinoFFT@^2.0.4 ; unused after FFT-based tracker was commented out
    adafruit/Adafruit PWM Servo Driver Library
; Pro OTA upload (po prvnim nahrani kabelem) muzete odkomentovat:
; upload_protocol = espota
; upload_port = auto-tuner.local
; Pokud mate nastavene OTA_PASSWORD, nastavte i auth:
; upload_flags =
;   --auth=change-me
[env:esp32_ota]
platform = espressif32
board = esp32dev
framework = arduino

upload_protocol = espota
upload_port = 10.161.173.247
; Fix OTA on Windows with multiple network adapters (espota must know which PC IP to call back).
; Your Wi-Fi IPv4 (from `ipconfig`) is currently 10.161.173.87.
; If you change networks, update --host_ip accordingly.
; Note: Windows firewall rule must match your network category (Private/Public).
upload_flags =
  --host_ip=10.161.173.87
  --host_port=32323
  --timeout=30
monitor_speed = 115200
lib_deps =
;    kosme/arduinoFFT@^2.0.4 ; unused after FFT-based tracker was commented out
    adafruit/Adafruit PWM Servo Driver Library
